name: Build & Test

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run smoke tests (Unix)
        if: runner.os != 'Windows'
        run: ./build/TekkChild670Tests_artefacts/Release/TekkChild670Tests

      - name: Run smoke tests (Windows)
        if: runner.os == 'Windows'
        run: ./build/TekkChild670Tests_artefacts/Release/TekkChild670Tests.exe

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: TekkChild-TA-670-MK2-${{ runner.os }}-VST3
          path: build/TekkChild670_artefacts/Release/VST3/
          if-no-files-found: error
