name: Build & Test

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run smoke tests (Unix)
        if: runner.os != 'Windows'
        run: ./build/TekkChild670Tests_artefacts/Release/TekkChild670Tests

      - name: Run smoke tests (Windows)
        if: runner.os == 'Windows'
        run: ./build/TekkChild670Tests_artefacts/Release/TekkChild670Tests.exe

      # Host-level validation: RT-safety, parameter/state threading, bus
      # layouts, automation and fuzzing. Run on Linux under a virtual display.
      - name: Validate with pluginval
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          curl -sL -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
          unzip -o pluginval.zip -d pluginval-bin
          chmod +x pluginval-bin/pluginval
          VST3=$(find build/TekkChild670_artefacts/Release/VST3 -maxdepth 1 -name "*.vst3" | head -1)
          echo "Validating: $VST3"
          xvfb-run -a -s "-screen 0 1280x1024x24" pluginval-bin/pluginval \
            --strictness-level 10 --validate "$VST3"

      - name: Generate characterisation plots
        if: runner.os == 'Linux'
        run: |
          ./build/TekkChild670Measure_artefacts/Release/TekkChild670Measure measurements

      - name: Upload measurements
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: TekkChild-TC-670-measurements
          path: measurements/*.svg

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: TekkChild-TC-670-${{ runner.os }}-VST3
          path: build/TekkChild670_artefacts/Release/VST3/
          if-no-files-found: error
